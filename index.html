<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HOPEverse</title>
<style>
body {
  font-family: Arial;
  background: #0b0f1a;
  color: white;
  padding: 20px;
}
input, button, textarea {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}
button {
  background: #00d4ff;
  cursor: pointer;
}
.card {
  background: #111827;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
}
</style>
</head>
<body>

<h2>HOPEverse</h2>

<div class="card">
  <h3>Login</h3>
  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="password">
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<div class="card">
  <h3>Ask</h3>
  <textarea id="prompt" rows="3" style="width:100%"></textarea>
  <button onclick="ask()">Run</button>
</div>

<div class="card">
  <h3>Answer</h3>
  <div id="answer"></div>
</div>

<div class="card">
  <h3>History</h3>
  <button onclick="loadHistory()">Load History</button>
  <div id="history"></div>
</div>

<script>
const API = "https://hopetensor.onrender.com";
let userEmail = null;

function register() {
  fetch(API + "/v1/did/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  }).then(r=>r.json()).then(d=>{
    alert("Registered: " + d.status);
  });
}

function login() {
  fetch(API + "/v1/did/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  }).then(r=>r.json()).then(d=>{
    if(d.status === "ok"){
      userEmail = document.getElementById("email").value;
      alert("Login OK");
    } else {
      alert("Login failed");
    }
  });
}

function ask() {
  fetch(API + "/v1/reason", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      prompt: document.getElementById("prompt").value,
      user_id: userEmail
    })
  }).then(r=>r.json()).then(d=>{
    document.getElementById("answer").innerText = d.answer;
  });
}

function loadHistory() {
  fetch(API + "/v1/reason/history?user_id=" + userEmail)
    .then(r=>r.json())
    .then(data=>{
      let html = "";
      data.forEach(x=>{
        html += "<p><b>" + x.prompt + "</b><br>" + x.answer + "</p>";
      });
      document.getElementById("history").innerHTML = html;
    });
}
</script>

</body>
</html>
