<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HOPEverse Demo</title>
  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial;
      padding: 40px;
    }
    textarea {
      width: 100%;
      height: 120px;
      background: #020617;
      color: white;
      border: 1px solid #334155;
      padding: 10px;
      border-radius: 8px;
    }
    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #06b6d4;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #output {
      margin-top: 20px;
      padding: 15px;
      background: #020617;
      border-radius: 8px;
      border: 1px solid #334155;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h1>🚀 HOPEverse Live Demo</h1>

<textarea id="prompt">
Explain why AI hallucinations happen and how to reduce them.
</textarea>

<br>
<button onclick="run()">Run</button>

<div id="output">Waiting...</div>

<script>
const API_BASE = "https://hopetensor.onrender.com";

function apiUrl(path) {
  return API_BASE + path;
}

async function run() {
  const text = document.getElementById("prompt").value;

  document.getElementById("output").innerText = "Loading...";

  try {
    const res = await fetch(apiUrl("/query"), {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text: text,
        user_id: "demo",
        session_id: "web",
        mode: "chat"
      })
    });

    const data = await res.json();

    document.getElementById("output").innerText =
      JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("output").innerText =
      "ERROR:\n" + err;
  }
}
</script>

</body>
</html>
